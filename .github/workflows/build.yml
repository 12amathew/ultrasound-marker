name: Build and Release

# Triggers:
# - Push a tag like "v1.0.1" → builds both installers and publishes a GitHub Release
# - "Run workflow" button in GitHub Actions tab → builds without publishing (for testing)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci also runs the postinstall script which rebuilds better-sqlite3
      # for the correct Electron version on this platform automatically.
      - name: Install dependencies
        run: npm ci

      # Set package.json version from the git tag (v1.2.3 → 1.2.3).
      # Must run AFTER npm ci, which resets package.json to the lockfile state.
      # On manual runs (no tag), the version stays at the placeholder 0.0.0.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      # GH_TOKEN lets electron-builder publish the built installers
      # directly to the GitHub Release created by this tag push.
      - name: Build and publish installer
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
