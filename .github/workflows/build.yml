name: Build and Release

# Triggers:
# - Push a tag like "v1.0.1" → builds both installers and publishes a GitHub Release
# - "Run workflow" button in GitHub Actions tab → builds without publishing (for testing)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci also runs the postinstall script which rebuilds better-sqlite3
      # for the correct Electron version on this platform automatically.
      - name: Install dependencies
        run: npm ci

      # GH_TOKEN lets electron-builder publish the built installers
      # directly to the GitHub Release created by this tag push.
      - name: Build and publish installer
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
