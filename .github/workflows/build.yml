name: Build and Release

# Triggers:
# - Push a tag like "v1.0.0" → builds both installers and publishes a GitHub Release
# - "Run workflow" button in GitHub Actions tab → builds without publishing (for testing)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # better-sqlite3 is a native Node addon and must be compiled
      # specifically for the Electron version on each platform.
      - name: Rebuild native modules for Electron
        run: npx electron-rebuild

      - name: Build installer
        run: npm run package

      # Upload the installer as a build artifact (always, even on workflow_dispatch)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: warn

      # Attach the installer to the GitHub Release (only when triggered by a tag push)
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
